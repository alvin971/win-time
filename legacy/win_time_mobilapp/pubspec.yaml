name: win_time
description: Plateforme Click & Collect pour Restaurants
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0
  retrofit: ^4.5.0
  json_annotation: ^4.9.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  cloud_firestore: ^5.5.2
  flutter_local_notifications: ^18.0.1

  # Authentication
  flutter_secure_storage: ^9.2.2

  # Payment
  flutter_stripe: ^11.2.0

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Image Handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # UI Components
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16
  carousel_slider: ^5.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1

  # Utilities
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  dartz: ^0.10.1

  # Connectivity & WebSocket
  connectivity_plus: ^6.1.1
  socket_io_client: ^3.0.1

  # Forms & Validation
  reactive_forms: ^16.1.0

  # Permissions
  permission_handler: ^11.3.1

  # QR Code
  qr_flutter: ^4.1.0
  # mobile_scanner: ^5.2.3  # Temporarily disabled due to GoogleUtilities conflict

  # Analytics
  sentry_flutter: ^8.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.4
  hive_generator: ^2.0.1

  # Linting
  flutter_lints: ^5.0.0
  very_good_analysis: ^6.0.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
