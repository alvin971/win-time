name: Deploy — Win Time Client → Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'win_time_mobilapp/**'
      - 'packages/shared_core/**'
  workflow_dispatch:

jobs:
  build_and_deploy_web:
    name: Build Web + Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Get dependencies — shared_core
        working-directory: packages/shared_core
        run: flutter pub get

      - name: Get dependencies
        working-directory: win_time_mobilapp
        run: flutter pub get

      - name: Build runner
        working-directory: win_time_mobilapp
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        working-directory: win_time_mobilapp
        run: |
          flutter build web --release \
            --tree-shake-icons \
            --no-source-maps \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=WS_BASE_URL=${{ secrets.WS_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy win_time_mobilapp/build/web --project-name=win-time-client --branch=main

  build_android:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Get dependencies — shared_core
        working-directory: packages/shared_core
        run: flutter pub get

      - name: Get dependencies
        working-directory: win_time_mobilapp
        run: flutter pub get

      - name: Build runner
        working-directory: win_time_mobilapp
        run: dart run build_runner build --delete-conflicting-outputs

      # Google Play has required App Bundles (.aab) since August 2021.
      # Building APK directly is rejected at upload time. We build .aab for
      # the Play deploy and keep --obfuscate + --split-debug-info for
      # competitive-IP protection (audit S6.2.9).
      - name: Build App Bundle (release)
        working-directory: win_time_mobilapp
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=WS_BASE_URL=${{ secrets.WS_BASE_URL }} \
            --dart-define=STRIPE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-time-client-aab
          path: win_time_mobilapp/build/app/outputs/bundle/release/app-release.aab

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: win-time-client-debug-info
          path: win_time_mobilapp/build/debug-info/
          if-no-files-found: ignore
