name: iOS — Win Time Pro — TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'win_time_pro_mobilapp/**'
      - 'packages/shared_core/**'
  workflow_dispatch:

concurrency:
  group: ios-signing
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: stable
          cache: true

      - name: Flutter pub get — shared_core
        working-directory: packages/shared_core
        run: flutter pub get

      - name: Flutter pub get
        working-directory: win_time_pro_mobilapp
        run: flutter pub get

      - name: Write App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8

      - name: Create Fastlane Appfile
        run: |
          cat > win_time_pro_mobilapp/ios/fastlane/Appfile << EOF
          app_identifier "${{ secrets.BUNDLE_ID_PRO }}"
          team_id "${{ secrets.APPLE_TEAM_ID }}"
          EOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: win_time_pro_mobilapp/ios

      - name: Install Fastlane
        run: bundle install
        working-directory: win_time_pro_mobilapp/ios

      - name: Install CocoaPods
        run: pod install --repo-update
        working-directory: win_time_pro_mobilapp/ios

      - name: Purge orphan Distribution certificates
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_CONTENT: ${{ secrets.APP_STORE_API_KEY_CONTENT }}
        run: |
          pip3 install PyJWT cryptography --quiet --break-system-packages
          python3 scripts/purge_dist_certs.py


      - name: Select Xcode 26
        run: |
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE26" ]; then
            sudo xcode-select -switch "$XCODE26/Contents/Developer"
            echo "Selected Xcode 26: $XCODE26"
          else
            echo "Xcode 26 not found, listing available:"
            ls /Applications/Xcode*.app 2>/dev/null
          fi
          xcodebuild -version

      - name: Build runner
        working-directory: win_time_pro_mobilapp
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Flutter build iOS
        working-directory: win_time_pro_mobilapp
        run: flutter build ios --release --no-codesign

      - name: Fastlane release
        run: bundle exec fastlane ios release
        working-directory: win_time_pro_mobilapp/ios
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID_PRO }}
